services:
  - type: worker
    name: hyperliquid-bot-v8
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: HYPERLIQUID_API_KEY
        sync: false
      - key: HYPERLIQUID_API_SECRET
        sync: false
      - key: MONGO_URL
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DEBUG
        value: "true"
